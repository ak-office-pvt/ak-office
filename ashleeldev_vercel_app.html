    <style>

  <body>
    <!-- Start Screen Overlay -->
    <div id="start-overlay">
      <div class="game-logo">
        <img src="/Games/Modifly/icon.jpg" alt="Game Icon" class="game-icon" />
        <h1>
          🚀 MODI FLY Web Game 🚀
        </h1>
        <div class="subtitle">
          The Ultimate Flying Adventure with Modi ji.
        </div>
      </div>
      <button class="play-button" onclick="startGame()">
        PLAY
      </button>
    </div>
    <div id="game-container">
      <header>
        <h1>
           🚀 Modi Fly 🚀 
        </h1>
        <div class="score-container">
          <div id="currentScore">
            Score: 0
          </div>
        </div>
      </header>
      <canvas id="canvas" width="400" height="600">
      </canvas>
      <div id="overlay">
        <img id="overlay-image" src="" alt="" />
        <button class="btn-restart" onclick="restartGame()">
          Play Again
        </button>
      </div>
    </div>
    <script>
      const canvas = document.getElementById(&#39;canvas&#39;);
    const ctx = canvas.getContext(&#39;2d&#39;);
    const overlay = document.getElementById(&#39;overlay&#39;);
    const overlayImage = document.getElementById(&#39;overlay-image&#39;);
    const startOverlay = document.getElementById(&#39;start-overlay&#39;);

    // Audio setup
    const bgMusic = new Audio(&#39;/Games/Modifly/fly.mp3&#39;);
    const overSound = new Audio(&#39;/Games/Modifly/over.mp3&#39;);
    const wonSound = new Audio(&#39;/Games/Modifly/won.mp3&#39;);
    
    bgMusic.loop = true;
    bgMusic.volume = 0.4;
    overSound.volume = 0.6;
    wonSound.volume = 0.6;

    // Load images
    const backgroundImg = new Image();
    const pipeTopImg = new Image();
    const pipeBottomImg = new Image();
    const heroImg = new Image();
    const trophyImg = new Image();

    backgroundImg.src = &#34;/Games/Modifly/background.png&#34;;
    pipeTopImg.src = &#34;/Games/Modifly/pillar-1.png&#34;;
    pipeBottomImg.src = &#34;/Games/Modifly/pillar-2.png&#34;;
    heroImg.src = &#34;/Games/Modifly/jetpack.png&#34;;
    trophyImg.src = &#34;/Games/Modifly/trophy.png&#34;;

    let gamePlaying = false;
    let gameStarted = false;
    let hasWon = false;
    let showTrophy = false;
    const gravity = 0.5;
    const speed = 2.2;
    const size = [80, 90];
    const jump = -8.5;
    const cTenth = (canvas.width / 10);
    const winScore = 15;

    let index = 0,
        flight,
        flyHeight,
        currentScore,
        pipes,
        particles = [],
        trophyReached = false,
        trophyPosition = { x: 0, y: 0 },
        winTimer = null;

    const pipeWidth = 90;
    const pipeGap = 280;

    const pipeLoc = () =&gt; Math.random() * (canvas.height - pipeGap - 200) + 80;

    const setup = () =&gt; {
      currentScore = 0;
      flight = jump;
      flyHeight = (canvas.height / 2) - (size[1] / 2);
      pipes = Array(3).fill().map((_, i) =&gt; [
        canvas.width + i * (pipeGap + pipeWidth),
        pipeLoc()
      ]);
      particles = [];
      hasWon = false;
      trophyReached = false;
      showTrophy = false;
      trophyPosition = { x: 0, y: 0 };
      overlay.classList.remove(&#39;show&#39;);
      if (winTimer) {
        clearTimeout(winTimer);
        winTimer = null;
      }
    };

    // Smoke particle system
    class SmokeParticle {
      constructor(x, y) {
        this.x = x + (Math.random() - 0.5) * 10;
        this.y = y;
        this.radius = Math.random() * 3 + 3;
        this.alpha = 1;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = -(Math.random() * 0.3 + 0.2);
        this.drift = Math.random() * 0.02 + 0.01;
        this.life = 1;
        this.maxLife = Math.random() * 80 + 60;
        this.age = 0;
        this.wobble = Math.random() * Math.PI * 2;
      }

      update() {
        this.age++;
        this.wobble += 0.05;
        this.y += this.speedY;
        this.x += this.speedX + Math.sin(this.wobble) * this.drift;
        this.speedY *= 0.99;
        this.life = 1 - (this.age / this.maxLife);
        this.alpha = Math.max(0, this.life);
        this.radius += 0.02;
      }

      draw() {
        if (this.alpha &lt;= 0) return;
        
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.radius
        );
        
        gradient.addColorStop(0, `rgba(255, 255, 255, ${this.alpha * 0.9})`);
        gradient.addColorStop(0.4, `rgba(250, 250, 255, ${this.alpha * 0.6})`);
        gradient.addColorStop(0.7, `rgba(240, 240, 250, ${this.alpha * 0.3})`);
        gradient.addColorStop(1, `rgba(230, 230, 240, 0)`);
        
        ctx.save();
        ctx.globalCompositeOperation = &#39;screen&#39;;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * 2, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha * 0.1})`;
        ctx.fill();
        ctx.restore();
        
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = gradient;
        ctx.fill();
      }

      isDead() {
        return this.age &gt;= this.maxLife || this.alpha &lt;= 0;
      }
    }

    function createSmokeParticles(x, y) {
      if (particles.length &lt; 3 &amp;&amp; Math.random() &lt; 0.3) {
        particles.push(new SmokeParticle(x, y));
      }
    }

    function updateAndDrawParticles() {
      for (let i = particles.length - 1; i &gt;= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].isDead()) {
          particles.splice(i, 1);
        }
      }
    }

    const showEndScreen = (type) =&gt; {
      gamePlaying = false;
      bgMusic.pause();
      bgMusic.currentTime = 0;
      
      if (type === &#39;won&#39;) {
        overlayImage.src = &#39;/Games/Modifly/won.png&#39;;
        wonSound.play().catch(e =&gt; console.log(&#39;Won sound failed:&#39;, e));
      } else {
        overlayImage.src = &#39;/Games/Modifly/over.png&#39;;
        overSound.play().catch(e =&gt; console.log(&#39;Over sound failed:&#39;, e));
      }
      
      overlay.classList.add(&#39;show&#39;);
    };

    const render = () =&gt; {
      index++;
      
      // Draw scrolling background
      const bgX = -(index * (speed / 2)) % canvas.width;
      ctx.drawImage(backgroundImg, bgX, 0, canvas.width, canvas.height);
      ctx.drawImage(backgroundImg, bgX + canvas.width, 0, canvas.width, canvas.height);

      // Draw pipes only if haven&#39;t reached win score
      if (gamePlaying &amp;&amp; currentScore &lt; winScore) {
        pipes.forEach(pipe =&gt; {
          pipe[0] -= speed;

          const topHeight = pipe[1];
          const bottomY = pipe[1] + pipeGap;
          const pillarHeight = 300;

          ctx.shadowColor = &#39;rgba(0, 0, 0, 0.3)&#39;;
          ctx.shadowBlur = 8;
          ctx.shadowOffsetX = 4;
          ctx.shadowOffsetY = 4;
          
          ctx.drawImage(pipeTopImg, pipe[0], topHeight - pillarHeight, pipeWidth, pillarHeight);
          ctx.drawImage(pipeBottomImg, pipe[0], bottomY, pipeWidth, pillarHeight);
          
          ctx.shadowColor = &#39;transparent&#39;;
          ctx.shadowBlur = 0;

          if (pipe[0] &lt;= -pipeWidth) {
            currentScore++;
            
            // Check if reached win score
            if (currentScore &gt;= winScore) {
              // Clear all pipes immediately
              pipes = [];
              // Show trophy
              showTrophy = true;
              trophyPosition.x = canvas.width / 2;
              trophyPosition.y = canvas.height / 2;
              
              // Auto-win after 3 seconds
              if (!winTimer) {
                winTimer = setTimeout(() =&gt; {
                  hasWon = true;
                  gamePlaying = false;
                  showEndScreen(&#39;won&#39;);
                }, 3000);
              }
              return;
            }
            
            // Spawn new pipe only if below win score
            pipes = [
              ...pipes.slice(1),
              [pipes[pipes.length - 1][0] + pipeGap + pipeWidth, pipeLoc()],
            ];
          }

          // Collision detection
          const hitPipe =
            pipe[0] &lt;= cTenth + size[0] - 10 &amp;&amp;
            pipe[0] + pipeWidth &gt;= cTenth + 10 &amp;&amp;
            (flyHeight &lt;= topHeight + 5 || flyHeight + size[1] &gt;= bottomY - 5);

          if (hitPipe) {
            showEndScreen(&#39;over&#39;);
          }
        });
      }
      
      // Trophy appears after 15 points
      if (showTrophy &amp;&amp; !hasWon) {
        // Draw trophy at FIXED center position with bounce
        const bounce = Math.sin(index * 0.08) * 15;
        const trophySize = 100;
        
        ctx.save();
        ctx.shadowColor = &#39;rgba(255, 215, 0, 0.8)&#39;;
        ctx.shadowBlur = 30;
        
        const trophyDrawX = trophyPosition.x - trophySize / 2;
        const trophyDrawY = trophyPosition.y - trophySize / 2 + bounce;
        
        ctx.drawImage(
          trophyImg, 
          trophyDrawX, 
          trophyDrawY, 
          trophySize, 
          trophySize
        );
        ctx.restore();
      }

      // Smoke effect
      if (gamePlaying &amp;&amp; !hasWon) {
        createSmokeParticles(cTenth + size[0] / 2 - 10, flyHeight + size[1] - 15);
      }
      updateAndDrawParticles();

      // Draw hero
      let angle = Math.max(Math.min(flight * -0.05, 0.4), -0.4);

      ctx.save();
      ctx.shadowColor = &#39;rgba(0, 0, 0, 0.4)&#39;;
      ctx.shadowBlur = 10;
      ctx.shadowOffsetX = 3;
      ctx.shadowOffsetY = 3;
      
      ctx.translate(cTenth + size[0] / 2, flyHeight + size[1] / 2);
      ctx.rotate(angle);
      ctx.drawImage(heroImg, -size[0] / 2, -size[1] / 2, size[0], size[1]);
      ctx.restore();

      if (gamePlaying &amp;&amp; !hasWon) {
        flight += gravity;
        flyHeight = Math.min(flyHeight + flight, canvas.height - size[1]);
        
        if (flyHeight &gt;= canvas.height - size[1] - 5) {
          showEndScreen(&#39;over&#39;);
        }
        
        if (flyHeight &lt;= 0) {
          flyHeight = 0;
          flight = 0;
        }
      } else if (!gameStarted) {
        flyHeight = (canvas.height / 2) - (size[1] / 2);
        
        ctx.fillStyle = &#34;rgba(0, 0, 0, 0.7)&#34;;
        ctx.fillRect(0, canvas.height / 2 - 100, canvas.width, 200);
        
        ctx.fillStyle = &#34;#fff&#34;;
        ctx.font = &#34;bold 18px &#39;Press Start 2P&#39;&#34;;
        ctx.textAlign = &#39;center&#39;;
        ctx.shadowColor = &#39;#000&#39;;
        ctx.shadowBlur = 4;
        ctx.fillText(&#39;Click to Play&#39;, canvas.width / 2, canvas.height / 2 - 20);
        
        ctx.font = &#34;12px &#39;Press Start 2P&#39;&#34;;
        ctx.fillText(`Reach ${winScore} points to win!`, canvas.width / 2, canvas.height / 2 + 30);
        
        const pulse = Math.sin(index * 0.05) * 0.3 + 0.7;
        ctx.globalAlpha = pulse;
        ctx.fillText(&#39; TAP &#39;, canvas.width / 2, canvas.height / 2 + 70);
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 0;
      }

      document.getElementById(&#39;currentScore&#39;).innerText = `Score: ${currentScore} ${hasWon ? &#39;&#39; : &#39;&#39;}`;

      requestAnimationFrame(render);
    };

    function startGame() {
      startOverlay.classList.add(&#39;hide&#39;);
      setTimeout(() =&gt; {
        startOverlay.style.display = &#39;none&#39;;
      }, 500);
    }

    function restartGame() {
      setup();
      gameStarted = false;
      gamePlaying = false;
    }

    setup();
    backgroundImg.onload = () =&gt; render();

    const handleInput = (e) =&gt; {
      e.preventDefault();
      
      if (!gameStarted) {
        gameStarted = true;
        gamePlaying = true;
        bgMusic.play().catch(e =&gt; console.log(&#39;Audio play failed:&#39;, e));
      }
      
      if (gamePlaying &amp;&amp; !hasWon) {
        flight = jump;
      }
    };

    canvas.addEventListener(&#39;click&#39;, handleInput);
    canvas.addEventListener(&#39;touchstart&#39;, handleInput, { passive: false });

    document.body.addEventListener(&#39;touchmove&#39;, (e) =&gt; {
      e.preventDefault();
    }, { passive: false });
    
    document.body.addEventListener(&#39;touchstart&#39;, (e) =&gt; {
      if (e.touches.length &gt; 1) {
        e.preventDefault();
      }
    }, { passive: false });
    </script>
