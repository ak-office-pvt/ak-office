
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATA IPL 2026 Web - Bingewave Sports</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: rgba(0, 0, 0, 0.3);
            --accent-primary: #a600ff;
            --accent-secondary: #ff007f;
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #0f0c29;  /* fallback for old browsers */
            background: -webkit-linear-gradient(to right, #24243e, #302b63, #0f0c29);
            background: linear-gradient(135deg, #0a0510, #220b34, #0a0510);
            color: var(--text-main);
            text-align: center;
            padding: 20px;
            min-height: 100vh;
            margin: 0;
            overflow-y: auto;
            background-attachment: fixed;
            box-sizing: border-box;
        }

        /* App Header */
        .app-header {
            position: sticky;
            top: 10px;
            z-index: 1200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            margin-bottom: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(20, 15, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .menu-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-main);
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            z-index: 100;
        }

        .menu-btn:hover {
            background: rgba(255,255,255,0.1);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .menu-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, #c35bfb, #ff007f);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(195, 91, 251, 0.3);
            letter-spacing: -1px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }
        
        /* Spacer to perfectly center h1 in flex container */
        .header-spacer {
            width: 46px; /* Width of menu-btn */
        }

        /* Sidebar Overlay */
        #sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1500;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        #sidebar-overlay.open {
            opacity: 1;
            visibility: visible;
        }

        /* Sidebar */
        #sidebar {
            position: fixed;
            top: 0;
            left: -320px;
            width: 280px;
            height: 100vh;
            background: rgba(20, 15, 30, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-right: 1px solid var(--glass-border);
            z-index: 2000;
            transition: left 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            box-shadow: 5px 0 30px rgba(0,0,0,0.5);
            text-align: left;
        }

        #sidebar.open {
            left: 0;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .sidebar-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
        }

        .close-menu-btn {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .close-menu-btn:hover {
            background: rgba(255,50,50,0.4);
            transform: scale(1.1);
        }

        #team-list {
            list-style: none;
            padding: 15px 10px;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .team-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-main);
            font-weight: 500;
            border: 1px solid transparent;
        }

        .team-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .team-item.active {
            background: linear-gradient(90deg, rgba(166, 0, 255, 0.2), transparent);
            border-left: 3px solid var(--accent-primary);
        }

        .team-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            padding: 2px;
            object-fit: contain;
        }

        /* Match Cards Container */
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Glassmorphism Card */
        .match-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            padding: 25px;
            width: 320px;
            text-align: left;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .match-card:hover {
            transform: translateY(-8px);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 15px 40px rgba(166, 0, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .match-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 10px;
        }

        /* Status Badges */
        .status {
            background: rgba(255, 255, 255, 0.1);
            color: #d8b4fe;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(216, 180, 254, 0.3);
            display: flex;
            align-items: center;
        }

        .status.live {
            background: rgba(255, 50, 50, 0.15);
            color: #ff4d4d;
            border: 1px solid rgba(255, 77, 77, 0.4);
            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);
            animation: pulse-red 2s infinite;
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.2); }
            50% { box-shadow: 0 0 15px rgba(255, 77, 77, 0.6); }
            100% { box-shadow: 0 0 5px rgba(255, 77, 77, 0.2); }
        }

        /* Teams Display */
        .teams {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0;
            position: relative;
        }

        .team {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            flex: 1;
            z-index: 2;
        }

        .team img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            object-fit: contain;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .match-card:hover .team img {
            transform: scale(1.1);
        }

        .team span {
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .teams > span.vs {
            font-size: 18px;
            font-weight: 800;
            font-style: italic;
            color: rgba(255, 255, 255, 0.2);
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        /* Match Info */
        .match-info {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .venue {
            color: #d8b4fe;
            font-weight: 600;
        }

        /* Buttons */
        .watch-btn {
            display: block;
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #fff;
            border-radius: 12px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            border: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(166, 0, 255, 0.3);
            box-sizing: border-box;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .watch-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .watch-btn:hover::after {
            left: 100%;
        }

        .watch-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(166, 0, 255, 0.5);
            background: linear-gradient(135deg, #b026ff, #ff1a8c);
        }

        .event-not-started {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 12px;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 20px;
            font-weight: 600;
            border: 1px dashed rgba(255, 255, 255, 0.1);
        }

        /* Popup Notification */
        #popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            animation: fadeIn 0.4s forwards ease-out;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .popup-content {
            background: rgba(20, 15, 30, 0.7);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            color: white;
            padding: 40px 30px;
            text-align: center;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 360px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            transform: scale(0.9);
            animation: popIn 0.4s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .popup-content::before {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        @keyframes popIn {
            to { transform: scale(1); }
        }

        .popup-content h2 {
            margin: 0 0 15px;
            color: #fff;
            font-size: 1.8rem;
            font-weight: 800;
            text-shadow: 0 0 15px rgba(195, 91, 251, 0.4);
        }

        .popup-content p {
            margin: 0 0 25px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 15px;
            line-height: 1.6;
        }

        .popup-content button {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }

        .popup-content .join-btn {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            box-shadow: 0 4px 15px rgba(166, 0, 255, 0.3);
        }

        .popup-content .join-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(166, 0, 255, 0.5);
        }

        .popup-content .close-btn {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .popup-content .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        /* Custom Scrollbar for modern feel */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.4);
        }

        .no-matches {
            width: 100%;
            padding: 50px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
            text-align: center;
            background: var(--glass-bg);
            border: 1px dashed var(--glass-border);
            border-radius: 20px;
            margin: 0 20px;
        }
    </style>
</head>
<body>

    <!-- Header containing Hamburger and Title -->
    <header class="app-header">
        <button class="menu-btn" onclick="toggleMenu()" aria-label="Open Menu">
            <svg viewBox="0 0 24 24">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </button>
        <h1>TATA IPL 2026</h1>
        <div class="header-spacer"></div>
    </header>

    <!-- Sidebar Menu Overlay -->
    <div id="sidebar-overlay" onclick="toggleMenu()"></div>

    <!-- Sidebar Menu -->
    <nav id="sidebar">
        <div class="sidebar-header">
            <h2>Teams</h2>
            <button class="close-menu-btn" onclick="toggleMenu()">✖</button>
        </div>
        <ul id="team-list">
            <!-- Dynamic Teams inserted here -->
        </ul>
    </nav>

    <!-- Main Matches Container -->
    <div class="container" id="matches"></div>

    <script>
        let allMatchesData = null;
        let flagsData = null;
        let isListPopulated = false;

        async function fetchMatches() {
            try {
                const response = await fetch("https://binge-api.vercel.app/ipl.json");
                const data = await response.json();
                
                allMatchesData = data.matches;
                flagsData = data.flags;

                if (!isListPopulated) {
                    populateSidebar(flagsData);
                    isListPopulated = true;
                }

                renderMatches();
            } catch (error) {
                console.error("Error fetching matches:", error);
            }
        }

        function getTeamLogo(teamName) {
            if (!flagsData) return "";
            const team = flagsData.find(flag => flag.name === teamName);
            return team ? team.img : "";
        }

        function populateSidebar(flags) {
            const teamList = document.getElementById("team-list");
            teamList.innerHTML = "";

            // Generic "All Matches" Button
            const allItem = document.createElement("li");
            allItem.classList.add("team-item");
            allItem.onclick = () => filterByTeam('all');
            allItem.innerHTML = `
                <div style="width:32px; height:32px; border-radius:50%; background:var(--glass-bg); display:flex; align-items:center; justify-content:center; border:1px solid var(--glass-border); font-size:16px;">🏏</div>
                <span>All Matches</span>
            `;
            teamList.appendChild(allItem);

            // Populate individual team buttons
            flags.forEach(flag => {
                const li = document.createElement("li");
                li.classList.add("team-item");
                li.onclick = () => filterByTeam(flag.name);
                li.dataset.team = flag.name;
                li.innerHTML = `
                    <img src="${flag.img}" alt="${flag.name}">
                    <span>${flag.name}</span>
                `;
                teamList.appendChild(li);
            });
            updateActiveSidebarItem();
        }
        function filterByTeam(teamName) {
            if (teamName === 'all') {
                history.pushState({ team: null }, "", window.location.pathname);
            } else {
                history.pushState({ team: teamName }, "", "?team=" + encodeURIComponent(teamName));
            }
            renderMatches();
            toggleMenu(); 
        }

        function updateActiveSidebarItem() {
            const urlParams = new URLSearchParams(window.location.search);
            const teamFilter = urlParams.get('team');
            const items = document.querySelectorAll(".team-item");
            items.forEach(item => item.classList.remove("active"));
            
            if (!teamFilter) {
                if(items.length > 0) items[0].classList.add("active"); // Select "All Matches"
            } else {
                items.forEach(item => {
                    if(item.dataset.team === teamFilter) {
                        item.classList.add("active");
                    }
                });
            }
        }

        // Listen for browser "Back" and "Forward" navigation events
        window.addEventListener("popstate", () => {
            if (allMatchesData) {
                renderMatches();
            }
        });

        function renderMatches() {
            if (!allMatchesData) return;
            
            updateActiveSidebarItem();

            const urlParams = new URLSearchParams(window.location.search);
            const teamFilter = urlParams.get('team');

            const matchesContainer = document.getElementById("matches");
            matchesContainer.innerHTML = "";
            const currentTime = new Date().getTime();

            // Filter matches if a team is selected
            const matchesToRender = teamFilter 
                ? allMatchesData.filter(m => m.team1 === teamFilter || m.team2 === teamFilter)
                : allMatchesData;

            if (matchesToRender.length === 0) {
                matchesContainer.innerHTML = `<div class="no-matches">No matches found for ${teamFilter || 'this selection'}.</div>`;
                return;
            }

            matchesToRender.forEach(match => {
                const startTime = new Date(`${match.date.split('-').reverse().join('-')}T${match.start_time}:00`).getTime();
                const endTime = new Date(`${match.date.split('-').reverse().join('-')}T${match.end_time}:00`).getTime();

                // Hide completed matches
                if (currentTime > endTime) return;

                const isLive = currentTime >= startTime && currentTime <= endTime;
                const statusText = isLive ? "Live" : "Upcoming";
                const statusClass = isLive ? "status live" : "status";

                const matchCard = document.createElement("div");
                matchCard.classList.add("match-card");
                matchCard.innerHTML = `
                    <div class="match-header">
                        <span>Match ${match.match_no}</span>
                        <span class="${statusClass}">
                            ${isLive ? '<span style="display:inline-block; width:6px; height:6px; background:#ff4d4d; border-radius:50%; margin-right:6px; margin-bottom:1px; animation: pulse-red 1s infinite;"></span>' : ''} 
                            ${statusText}
                        </span>
                    </div>
                    <div class="teams">
                        <div class="team">
                            <img src="${getTeamLogo(match.team1)}" alt="${match.team1}">
                            <span>${match.team1}</span>
                        </div>
                        <span class="vs">VS</span>
                        <div class="team">
                            <img src="${getTeamLogo(match.team2)}" alt="${match.team2}">
                            <span>${match.team2}</span>
                        </div>
                    </div>
                    <div class="match-info">
                        <span class="venue">Venue: ${match.venue}</span>
                        <span>${match.start_time}, ${match.date}</span>
                    </div>
                    ${isLive 
                        ? `<a href="/match?id=${match.id}" class="watch-btn">Watch Live</a>` 
                        : `<div class="event-not-started"><span>&#x23F3;</span> Event Not Started</div>`}
                `;
                matchesContainer.appendChild(matchCard);
            });
            
            // If all matched are completed for that team
            if (matchesContainer.innerHTML === "") {
                matchesContainer.innerHTML = `<div class="no-matches">All scheduled matches for this team have been completed.</div>`;
            }
        }

        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('sidebar-overlay').classList.toggle('open');
        }

        // Initialize App
        fetchMatches();
        setInterval(fetchMatches, 60000); // Refresh every 1 minute
        
        // Close telegram popup function
        function closePopup() {
            const popup = document.getElementById('popup');
            popup.style.opacity = '0';
            popup.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                popup.style.display = 'none';
            }, 300);
        }
    </script>
    
    <!-- Telegram Popup -->
    <div id="popup">
        <div class="popup-content">
            <h2>Support Us!</h2>
            <p>Join our Telegram channel <strong>@axtream_bingewav</strong> for more exclusive updates.</p>
            <button class="join-btn" onclick="window.open('https://t.me/axtream_bingewav', '_blank')">Join Telegram Now</button>
            <button class="close-btn" onclick="closePopup()">I'm Already Joined</button>
        </div>
    </div>
</body>
</html>
