<div class="samagra-page">

    <div class="samagra-container">

        <div class="samagra-title">
            Samagra Link Generator
        </div>

        <label>Samagra Member ID</label>

        <input type="text"
               id="memberId"
               placeholder="Member ID डालें">

        <button onclick="generateLink()">
            Generate Link
        </button>

        <div class="result" id="output"></div>

    </div>

<script>
function generateLink(){
    var memberId = document.getElementById("memberId").value.trim();

    if(memberId===""){
        alert("Member ID डालें");
        return;
    }

    var data = {
        FamilyId: 23482253,
        samagraid: Number(memberId),
        mobileno: "9039287237"
    };

    var jsonStr = JSON.stringify(data);
    var encoded = btoa(unescape(encodeURIComponent(jsonStr)));

    var finalLink =
    "https://samagra.gov.in/Citizen/RFC/ChangRequestLogin.aspx?R="
    + encoded +
    "#submenu7";

    document.getElementById("output").innerHTML =
    "<b>Generated Link:</b><br><br><a href='"+finalLink+
    "' target='_blank'>"+finalLink+"</a>";
}
</script>
