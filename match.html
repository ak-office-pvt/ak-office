            top: 10px;
            z-index: 1200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            margin-bottom: 15px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            background: rgba(20, 15, 30, 0.7);

            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.5);

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            cursor: pointer;
            padding: 10px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(8px);
            text-decoration: none;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: clamp(1.2rem, 5vw, 2.5rem);
            font-weight: 800;
            margin: 0;
            background: linear-gradient(90deg, #c35bfb, #ff007f);

            letter-spacing: -1px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;

        .header-spacer {
            width: 46px;
        }

        .player-wrapper {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--glass-shadow);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeIn 0.5s ease-out;

        .match-title {

            border: 1px solid rgba(255, 255, 255, 0.1);

            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;

            letter-spacing: 1px;

            box-shadow: 0 0 15px rgba(255, 50, 50, 0.3);

            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .status-live::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff4d4d;
            border-radius: 50%;
        }

        @keyframes pulse-red {
            0% {
                box-shadow: 0 0 5px rgba(255, 77, 77, 0.2);
            }

            50% {
                box-shadow: 0 0 15px rgba(255, 77, 77, 0.6);
            }

            100% {
                box-shadow: 0 0 5px rgba(255, 77, 77, 0.2);
            }
        }

        @property --angle {
            syntax: '<angle>';
            initial-value: 0deg;
            inherits: false;
        }

        .iframe-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            border-radius: 16px;
            padding: 3px;
            box-sizing: border-box;
            background: conic-gradient(from var(--angle), var(--color1, #a600ff), var(--color2, #ff007f), var(--color3, #004B8D), var(--color4, #FFD141), var(--color1, #a600ff));
            animation: spin-border 8s linear infinite alternate;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }
        
        .iframe-container::after {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background: inherit;
            filter: blur(12px);
            opacity: 0.8;
            z-index: -1;
        }

        @keyframes spin-border {
            0% { --angle: 0deg; }
            100% { --angle: -360deg; }

            width: 100%;
            height: 100%;
            border: none;
            border-radius: 14px;
            display: block;
            background: #000;
            position: relative;
            z-index: 10;

                    return;

                const txtResponse = await fetch("https://nothing18.pages.dev/ch-list.txt?t=" + new Date().getTime());
                const txtData = await txtResponse.text();

                const channelsData = [];
                const lines = txtData.split(/\r?\n/);
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('#ch')) {
                        const nameMatch = line.match(/name="([^"]+)"/);
                        const idMatch = line.match(/id="([^"]+)"/);
                        const urlMatch = line.match(/url="([^"]+)"/);

                        if (nameMatch && idMatch && urlMatch) {
                            channelsData.push({
                                name: nameMatch[1],
                                id: idMatch[1],
                                url: urlMatch[1]
                            });

                const availableChannels = [];

            <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;">
                <span class="status-live">Live</span>
                <h2 class="match-title" id="match-title">Loading Match...</h2>
            </div>

            <div class="channels-header" style="margin-top: 15px;">Available Channels</div>
            <select id="channel-dropdown" class="channel-dropdown">
                <!-- Options appended here dynamically -->
            </select>

            <div id="ad-container" style="margin-top: 5px;">
                <!-- Ad dynamically inserted -->
            </div>

            <!-- Match Information -->
            <div class="match-info-grid" id="match-info-grid" style="margin-top: 15px;">
                <!-- Info cards go here -->
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let matchId = urlParams.get('id');

        async function loadMatchDetails() {
            const wrapper = document.getElementById('player-wrapper');
            const loader = document.getElementById('loader');
            const content = document.getElementById('content');

            try {
                // Fetch matches JSON with empty cache-busting
                const jsonResponse = await fetch("https://binge-api.vercel.app/ipl.json?t=" + new Date().getTime());
                const data = await jsonResponse.json();

                // If no matching ID found, show error
                if (!matchId) {
                    wrapper.innerHTML = '<div class="error-message">Invalid match link.</div>';
                    return;
                }

                const match = data.matches.find(m => m.id === matchId);
                const flags = data.flags;

                if (!match) {
                    wrapper.innerHTML = '<div class="error-message">Match not found or has ended.</div>';
                    return;
                }

                const getTeamLogo = (teamName) => {
                    const team = flags.find(flag => flag.name === teamName);
                    return team ? team.img : "";
                };

                const matchChannels = data.channels || [];

                // Fetch Channels TXT with cache-busting
                const txtResponse = await fetch("https://nothing18.pages.dev/ch-list.txt?t=" + new Date().getTime());
                const txtData = await txtResponse.text();

                const channelsData = [];
                const lines = txtData.split(/\r?\n/);
                for (let line of lines) {
                    line = line.trim();
                    if (line.startsWith('#ch')) {
                        const nameMatch = line.match(/name="([^"]+)"/);
                        const idMatch = line.match(/id="([^"]+)"/);
                        const urlMatch = line.match(/url="([^"]+)"/);

                        if (nameMatch && idMatch && urlMatch) {
                            channelsData.push({
                                name: nameMatch[1],
                                id: idMatch[1],
                                url: urlMatch[1]
                            });
                        }
                    }
                }

                // Filter matching channels, keeping the exact order specified in the JSON
                const availableChannels = [];
                for (let chId of matchChannels) {
                    const foundCh = channelsData.find(c => c.id === chId);
                    if (foundCh) {
                        availableChannels.push(foundCh);
                    }
                }

                if (availableChannels.length === 0) {
                    wrapper.innerHTML = '<div class="error-message">Streaming links are not available for this match right now.</div>';
                    return;
                // Render match details and teams
                const team1Logo = getTeamLogo(match.team1);
                const team2Logo = getTeamLogo(match.team2);

                document.getElementById('match-title').innerHTML = `
                    <img src="${team1Logo}" alt="${match.team1}" onerror="this.style.display='none'">
                    ${match.team1} vs ${match.team2}
                    <img src="${team2Logo}" alt="${match.team2}" onerror="this.style.display='none'">
                `;

                // Select first channel by default
                const iframe = document.getElementById('video-frame');
                iframe.src = availableChannels[0].url;

                // Render channel selector
                const dropdown = document.getElementById('channel-dropdown');
                availableChannels.forEach((ch, index) => {
                    const option = document.createElement('option');
                    option.value = ch.url;
                    option.text = ch.name;
                    if (index === 0) option.selected = true;
                    dropdown.appendChild(option);
                });

                dropdown.addEventListener('change', (e) => {
                    iframe.src = e.target.value;
                });

                // Render Ad
                if (match.poster && match.url) {
                    const adContainer = document.getElementById('ad-container');
                    adContainer.className = 'ad-container';
                    adContainer.innerHTML = `
                        <a href="${match.url}" target="_blank" class="ad-link">
                            <img src="${match.poster}" alt="Advertisement" class="ad-banner">
                        </a>
                    `;
                }

                // Format Time function (+ 1hr 30 mins)
                function formatTimeAdd90Mins(timeStr) {
                    if (!timeStr) return "";
                    let [hours, minutes] = timeStr.split(':').map(Number);
                    minutes += 30;
                    hours += 1 + Math.floor(minutes / 60);
                    minutes = minutes % 60;
                    hours = hours % 24;
                    const ampm = hours >= 12 ? 'PM' : 'AM';
                    const h = hours % 12 || 12;
                    const m = minutes.toString().padStart(2, '0');
                    return `${h}:${m} ${ampm}`;
                }

                // Team Brand Colors
                const teamColors = {
                    "CSK": "linear-gradient(135deg, #F9CD05, #F15C19)",
                    "MI": "linear-gradient(135deg, #004B8D, #FFD141)",
                    "RCB": "linear-gradient(135deg, #EC1C24, #2B2A29)",
                    "KKR": "linear-gradient(135deg, #3A225D, #F2C028)",
                    "SRH": "linear-gradient(135deg, #FF822A, #000000)",
                    "GT": "linear-gradient(135deg, #0B4973, #D1AB3E)",
                    "LSG": "linear-gradient(135deg, #D71920, #003B7A, #D1AB3E)",
                    "DC": "linear-gradient(135deg, #004C93, #F32735)",
                    "PBKS": "linear-gradient(135deg, #D71920, #A7A9AC)",
                    "RR": "linear-gradient(135deg, #EA1A85, #001D48)"
                };

                const rawTeamColors = {
                    "CSK": ["#F9CD05", "#F15C19"],
                    "MI": ["#004B8D", "#FFD141"],
                    "RCB": ["#EC1C24", "#2B2A29"],
                    "KKR": ["#3A225D", "#F2C028"],
                    "SRH": ["#FF822A", "#000000"],
                    "GT": ["#0B4973", "#D1AB3E"],
                    "LSG": ["#D71920", "#003B7A"],
                    "DC": ["#004C93", "#F32735"],
                    "PBKS": ["#D71920", "#A7A9AC"],
                    "RR": ["#EA1A85", "#001D48"]
                };

                const t1Raw = rawTeamColors[match.team1] || ["#a600ff", "#ff007f"];
                const t2Raw = rawTeamColors[match.team2] || ["#004B8D", "#FFD141"];
                
                const iframeContainer = document.querySelector('.iframe-container');
                if (iframeContainer) {
                    iframeContainer.style.setProperty('--color1', t1Raw[0]);
                    iframeContainer.style.setProperty('--color2', t1Raw[1]);
                    iframeContainer.style.setProperty('--color3', t2Raw[0]);
                    iframeContainer.style.setProperty('--color4', t2Raw[1]);
                }

                const hTeamBg = teamColors[match.team1];
                const aTeamBg = teamColors[match.team2];

                const brandedStyle1 = hTeamBg ? `background: ${hTeamBg}; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);` : "";
                const brandedStyle2 = aTeamBg ? `background: ${aTeamBg}; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.2);` : "";
                const titleLbl1 = hTeamBg ? `color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.4);` : "";
                const titleVal1 = hTeamBg ? `text-shadow: 0 1px 3px rgba(0,0,0,0.4); font-size: 16px;` : "";
                const titleLbl2 = aTeamBg ? `color: rgba(255,255,255,0.9); text-shadow: 0 1px 3px rgba(0,0,0,0.4);` : "";
                const titleVal2 = aTeamBg ? `text-shadow: 0 1px 3px rgba(0,0,0,0.4); font-size: 16px;` : "";

                // Render Match Info
                const infoGrid = document.getElementById('match-info-grid');
                infoGrid.innerHTML = `
                    <div class="info-card">
                        <span class="info-label">Date</span>
                        <span class="info-value">${match.date}</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Match No.</span>
                        <span class="info-value">${match.match_no} of 74</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Start Time</span>
                        <span class="info-value">${formatTimeAdd90Mins(match.start_time)}</span>
                    </div>
                    <div class="info-card">
                        <span class="info-label">Venue</span>
                        <span class="info-value">${match.venue}</span>
                    </div>
                    <div class="info-card" style="${brandedStyle1}">
                        <span class="info-label" style="${titleLbl1}">Home Team</span>
                        <span class="info-value" style="${titleVal1}">${match.team1}</span>
                    </div>
                    <div class="info-card" style="${brandedStyle2}">
                        <span class="info-label" style="${titleLbl2}">Away Team</span>
                        <span class="info-value" style="${titleVal2}">${match.team2}</span>
                    </div>
                `;

                loader.style.display = 'none';
                content.style.display = 'block';

            } catch (error) {
                console.error("Error loading match data:", error);
                wrapper.innerHTML = `<div class="error-message">Failed to connect to servers. Please check your internet connection and try again.</div>`;
            }
        }

        loadMatchDetails();

        // Close telegram popup function
        function closePopup() {
            const popup = document.getElementById('popup');
            popup.style.opacity = '0';
            popup.style.transition = 'opacity 0.3s ease';
            setTimeout(() => {
                popup.style.display = 'none';
            }, 300);
        }
    </script>
    
    <!-- Telegram Popup -->
    <div id="popup">
        <div class="popup-content">
            <h2>Support Us!</h2>
            <p>Join our Telegram channel <strong>@axtream_bingewav</strong> for more exclusive updates.</p>
            <button class="join-btn" onclick="window.open('https://t.me/axtream_bingewav', '_blank')">Join Telegram Now</button>
            <button class="close-btn" onclick="closePopup()">I'm Already Joined</button>
        </div>
    </div>
</body>

</html>
